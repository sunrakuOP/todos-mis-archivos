<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ejercio 1 usando DIV</title>
  
  <body>
    <!-- cabecera -->
    <header>
      <h1>Juan Nicolas Ariza</h1>
      <!-- Navegacion -->
      <nav> 
        <a href="#incio">Inicio</a>
        <a href="#proyectos">Proyectos</a>
      </nav>
    </header>

    <!-- parte principal -->
    <main>
      <section id="inicio">
        <h2>Hola, soy Juan</h2>
        <p>Desarollador web</p>
      </section>

      <section id="proyectos">
        <h2>Proyectos</h2>
        <article>
          <h3>Portafolio</h3>
          <p>Mi segunda pagina web</p>
        </article>
      </section>

      <!-- formularios -->
      <br>
        <!-- label + entrada de texto-->
        <label for="nombre">Tu nombre: </label>
        <input type="text" id="nombre" placeholder="ej: Juan Nicolas"/>

        <!-- input de email -->
        <label for="correo">Tu correo: </label>
        <input type="email" id="correo" placeholder="juann@gmail.com"/>

        <!-- area de texto grande -->
        <label for="mensaje">Mensaje: </label>
        <textarea id="mensaje" rows="4" placeholder="Escribe tu mensaje"></textarea>

        <!-- boton para enviar -->
        <button type="submit">Enviar</button>

      </form>
    </main>

    <!-- Pie de pagina -->
     <footer>
      <p>© 2026 Juan Ariza</p>
     </footer> 
  </body>

  </head>
</html>
